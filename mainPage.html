<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Website</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #f0f9ff);
    overflow-x: hidden;
}

/* ================= NAVBAR ================= */
.navbar {
    background: linear-gradient(90deg, #0d3b66, #1d5fa7);
    padding: 15px 60px;
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

.navbar img {
    height: 45px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

.navbar img:hover {
    transform: scale(1.1);
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 30px;
    margin: 0;
    padding-right: 60px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    position: relative;
    transition: 0.3s ease;
}

.nav-links a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: #ffd166;
    left: 0;
    bottom: -5px;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

.nav-links a:hover {
    color: #ffd166;
}

.nav-links a:last-child {
    background: #ff4d6d;
    padding: 8px 18px;
    border-radius: 25px;
}

.nav-links a:last-child:hover {
    background: #ff1e4d;
    color: white;
}

/* Push content below navbar */
.content-wrapper {
    margin-top: 110px;
}

/* ================= MAP ================= */
#map {
    width: 88%;
    height: 500px;
    margin: 40px auto;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    display: none;
}

/* ================= SLIDESHOW ================= */
.slideshow-container {
    position: relative;
    max-width: 1200px;
    margin: 30px auto;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}

.mySlides {
    display: none;
}

.mySlides img {
    width: 100%;
    height: 520px;
    object-fit: cover;
    transition: transform 0.8s ease;
}

.mySlides img:hover {
    transform: scale(1.05);
}

.slideshow-container::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.6));
}

.page-title {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    z-index: 10;
    animation: fadeUp 1.2s ease;
}

.page-title h1 {
    font-size: 55px;
    margin: 0;
}

.page-title p {
    margin-top: 15px;
    font-size: 20px;
}

.explore-btn {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 30px;
    background: #ffd166;
    color: #0d3b66;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s ease;
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

.explore-btn:hover {
    background: white;
    transform: translateY(-3px);
}

/* Arrows */
.prev, .next {
    cursor: pointer;
    position: absolute;
    top: 50%;
    padding: 16px;
    color: white;
    font-weight: bold;
    font-size: 22px;
    transition: 0.3s;
    user-select: none;
    z-index: 10;
}

.prev { left: 15px; }
.next { right: 15px; }

.prev:hover, .next:hover {
    color: #ffd166;
    transform: scale(1.2);
}

/* Dots */
.dots-container {
    text-align: center;
    margin-top: 20px;
}

.dot {
    height: 13px;
    width: 13px;
    margin: 0 6px;
    background-color: #cbd5e1;
    border-radius: 50%;
    display: inline-block;
    cursor: pointer;
}

.active {
    background-color: #0d3b66;
}

/* Animation */
@keyframes fadeUp {
    from { opacity: 0; transform: translate(-50%, -30%); }
    to { opacity: 1; transform: translate(-50%, -50%); }
}
</style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="#" id="logo-link">
            <img src="earth-globe.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="destination.html">Destination</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="index.html">Logout</a></li>
    </ul>
</header>

<main class="content-wrapper">

<div id="map"></div>

<div class="slideshow-container">

    <div class="page-title">
        <h1>Let Your Journey Begin</h1>
        <p>Explore India's most beautiful destinations</p>
        <a href="destination.html" class="explore-btn">Explore Now</a>
    </div>

    <div class="mySlides"><img src="front3.jpg"></div>
    <div class="mySlides"><img src="front2.jpg"></div>
    <div class="mySlides"><img src="front1.jpg"></div>

    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>
</div>

<div class="dots-container">
    <span class="dot" onclick="currentSlide(1)"></span>
    <span class="dot" onclick="currentSlide(2)"></span>
    <span class="dot" onclick="currentSlide(3)"></span>
</div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

var slideIndex = 1;
showSlides(slideIndex);

window.plusSlides = function(n) { showSlides(slideIndex += n); }
window.currentSlide = function(n) { showSlides(slideIndex = n); }

function showSlides(n) {
    var slides = document.getElementsByClassName("mySlides");
    var dots = document.getElementsByClassName("dot");

    if (n > slides.length) slideIndex = 1;
    if (n < 1) slideIndex = slides.length;

    for (var i = 0; i < slides.length; i++)
        slides[i].style.display = "none";

    for (var i = 0; i < dots.length; i++)
        dots[i].className = dots[i].className.replace(" active", "");

    slides[slideIndex - 1].style.display = "block";
    dots[slideIndex - 1].className += " active";
}

/* Map */
var map;
var mapVisible = false;

document.getElementById("logo-link").addEventListener("click", function(e) {
    e.preventDefault();
    var mapDiv = document.getElementById("map");

    if (!mapVisible) {
        mapDiv.style.display = "block";

        if (!map) {
            map = L.map("map").setView([20.5937, 78.9629], 5);
            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "© OpenStreetMap contributors"
            }).addTo(map);

            L.marker([27.1751, 78.0421])
                .addTo(map)
                .bindPopup("Taj Mahal")
                .openPopup();
        }

        setTimeout(function () { map.invalidateSize(); }, 200);
        mapVisible = true;
    } else {
        mapDiv.style.display = "none";
        mapVisible = false;
    }
});

});
</script>

</body>
</html>
