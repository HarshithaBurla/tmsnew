<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #dbeafe, #f0f9ff);
    overflow-x: hidden;
}

/* NAVBAR */
.navbar {
    background: linear-gradient(90deg, #0d3b66, #1d5fa7);
    padding: 15px 60px;
    position: fixed;
    width: 100%;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

.navbar img {
    height: 45px;
    cursor: pointer;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 30px;
    margin: 0;
    padding-right: 60px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #ffd166;
}

/* Push content below navbar */
.content-wrapper {
    margin-top: 110px;
}

/* MAP */
#map {
    width: 88%;
    height: 500px;
    margin: 40px auto;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    display: none;
}

/* SLIDESHOW */
.slideshow-container {
    position: relative;
    max-width: 1200px;
    margin: 30px auto;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}

/* BLACK OVERLAY */
.slideshow-container::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.45);
    z-index: 5;
}

.mySlides {
    display: none;
}

.mySlides img {
    width: 100%;
    height: 520px;
    object-fit: cover;
}

/* TEXT OVERLAY */
.page-title {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
    z-index: 10;
}

.page-title h1 {
    font-size: 55px;
    margin: 0;
}

.page-title p {
    margin-top: 15px;
    font-size: 20px;
}

.explore-btn {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 30px;
    background: #ffd166;
    color: #0d3b66;
    text-decoration: none;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s;
}

.explore-btn:hover {
    background: white;
}
</style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="#" id="logo-link">
            <img src="earth-globe.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="destination.html">Destination</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="tripPlanner.html">Plan Trip</a></li> 
    <li><a href="previousPlans.php">Previous Plans</a></li>
    <li><a href="feedback.html">Feedback</a></li>
    <li><a href="index.html">Logout</a></li>
</ul>
</header>

<main class="content-wrapper">

<div id="map"></div>

<div class="slideshow-container">

    <div class="page-title">
        <h1>Let Your Journey Begin</h1>
        <p>Explore India's most beautiful destinations</p>
        <a href="destination.html" class="explore-btn">Explore Now</a>
    </div>

    <div class="mySlides"><img src="front3.jpg"></div>
    <div class="mySlides"><img src="front2.jpg"></div>
    <div class="mySlides"><img src="front1.jpg"></div>

</div>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

/* Slideshow */
var slideIndex = 0;
showSlides();

function showSlides() {
    var slides = document.getElementsByClassName("mySlides");
    for (var i = 0; i < slides.length; i++)
        slides[i].style.display = "none";

    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;

    slides[slideIndex - 1].style.display = "block";
    setTimeout(showSlides, 3000);
}

/* Map Toggle */
var map;
var mapVisible = false;

document.getElementById("logo-link").addEventListener("click", function(e) {
    e.preventDefault();
    var mapDiv = document.getElementById("map");

    if (!mapVisible) {
        mapDiv.style.display = "block";

        if (!map) {
            map = L.map("map").setView([20.5937, 78.9629], 5);

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                attribution: "© OpenStreetMap contributors"
            }).addTo(map);

            L.marker([27.1751, 78.0421])
                .addTo(map)
                .bindPopup("Taj Mahal")
                .openPopup();
        }

        setTimeout(function () { map.invalidateSize(); }, 200);
        mapVisible = true;
    } else {
        mapDiv.style.display = "none";
        mapVisible = false;
    }
});

});
</script>

</body>
</html>
