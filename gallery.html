<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #dbeafe, #e0f2fe, #f0f9ff);
}

        .navbar {
            background: #0d3b66;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar img {
            height: 40px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-links .active-menu a {
            border-bottom: 2px solid #ffd166;
        }

        .gallery-wrapper {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .gallery-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .gallery-title h1 {
            font-size: 36px;
            color: #0d3b66;
        }

        .location-section {
            margin-bottom: 70px;
        }

        .location-section h2 {
            margin-bottom: 25px;
            color: #333;
            border-left: 5px solid #0d3b66;
            padding-left: 10px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .image-grid img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            transition: 0.3s ease;
        }

        .image-grid img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<header class="navbar">
    <div class="logo">
        <a href="mainPage.html">
            <img src="earth-globe.png" alt="Logo">
        </a>
    </div>

    <ul class="nav-links">
        <li><a href="mainPage.html">Home</a></li>
        <li><a href="destination.html">Destination</a></li>
        <li class="active-menu"><a href="gallery.html">Gallery</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="index.html">Logout</a></li>
    </ul>
</header>

<div class="gallery-wrapper">

    <div class="gallery-title">
        <h1>Travel Gallery</h1>
    </div>

    <!-- Goa -->
    <div class="location-section" id="goa">
        <h2>Goa</h2>
        <div class="image-grid">
            <img src="images/gallery/goa1.jpg">
            <img src="images/gallery/goa2.jpg">
            <img src="images/gallery/goa3.jpg">
            <img src="images/gallery/goa4.jpg">
        </div>
    </div>

    <!-- Kerala -->
    <div class="location-section" id="kerala">
        <h2>Kerala</h2>
        <div class="image-grid">
            <img src="images/gallery/kerala1.jpg">
            <img src="images/gallery/kerala2.jpg">
            <img src="images/gallery/kerala3.jpg">
            <img src="images/gallery/kerala4.jpg">
        </div>
    </div>

    <!-- Ladakh -->
    <div class="location-section" id="ladakh">
        <h2>Ladakh</h2>
        <div class="image-grid">
            <img src="images/destination/ladakh1.jpg">
            <img src="images/destination/ladakh2.jpg">
            <img src="images/destination/ladakh3.jpg">
            <img src="images/destination/ladakh4.jpg">
        </div>
    </div>

    <!-- Agra -->
    <div class="location-section" id="agra">
        <h2>Agra</h2>
        <div class="image-grid">
            <img src="images/destination/tajmahal1.jpg">
            <img src="images/destination/tajmahal2.jpg">
            <img src="images/destination/tajmahal3.jpg">
            <img src="images/destination/tajmahal4.jpg">
        </div>
    </div>

    <!-- Rajasthan -->
    <div class="location-section" id="rajasthan">
        <h2>Rajasthan</h2>
        <div class="image-grid">
            <img src="images/destination/rajasthan1.jpg">
            <img src="images/destination/rajasthan2.jpg">
            <img src="images/destination/rajasthan3.jpg">
            <img src="images/destination/rajasthan4.jpg">
        </div>
    </div>

    <!-- Manali -->
    <div class="location-section" id="manali">
        <h2>Manali</h2>
        <div class="image-grid">
            <img src="images/destination/manali1.jpg">
            <img src="images/destination/manali2.jpg">
            <img src="images/destination/manali3.jpg">
            <img src="images/destination/manali4.jpg">
        </div>
    </div>

</div>

</body>
</html>
