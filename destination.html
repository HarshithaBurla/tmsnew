/* ===== GRID ===== */
.container {

    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

    padding: 40px;

/* ===== CARD ===== */
.box {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    transition: transform 0.4s;
}

.box:hover {
    transform: scale(1.05);
}

.imgBox img {
    width: 100%;
    height: 270px;
    object-fit: cover;
}

/* ===== OVERLAY ===== */
.name-text {

.name-text input {

    transition: 0.3s;
}

.name-text input:hover {

</style>
