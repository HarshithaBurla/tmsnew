<!DOCTYPE html>

<head>

<meta charset="UTF-8">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#1e3c72,#2a5298);
    color: white;
}

.container {
    max-width: 1000px;
    margin: 50px auto;
    background: white;
    color: black;
    padding: 40px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #0d3b66;
}

h3 {
    color: #0d3b66;
    margin-top: 25px;
}

ul {
    line-height: 1.8;
}

.back-btn {
    display: inline-block;
    margin-top: 25px;
    padding: 10px 20px;
    background: #ff9800;
    color: white;
    text-decoration: none;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="place-title"></h1>
    <p id="place-description"></p>

    <h3>Top Attractions</h3>
    <ul id="place-attractions"></ul>

    <h3>Best Time to Visit</h3>
    <p id="place-besttime"></p>

    <a href="gallery.html" class="back-btn">⬅ Back to Gallery</a>
</div>

window.onload = function () {

    const params = new URLSearchParams(window.location.search);
    const place = params.get("place");

    if (place && placeDetails[place]) {

        document.getElementById("place-title").innerText = place;
        document.getElementById("place-description").innerText = placeDetails[place].description;
        document.getElementById("place-besttime").innerText = placeDetails[place].bestTime;
        document.getElementById("place-extra").innerText = placeDetails[place].extra;

        let list = "";
        placeDetails[place].attractions.forEach(attraction => {
            list += `<li>${attraction}</li>`;
        });

        document.getElementById("place-attractions").innerHTML = list;
    }
};

</script>

</body>
</html>
