<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #f1f8ff);
}

/* ================= NAVBAR ================= */
.main {
    background: linear-gradient(90deg, #0d3b66, #1d5fa7);
    padding: 15px 60px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.15);
}

.main ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.list, .list2 {
    display: flex;
    align-items: center;
    gap: 25px;
}

.list img {
    transition: 0.3s;
}

.list img:hover {
    transform: scale(1.1);
}

.search form {
    display: flex;
    align-items: center;
    background: white;
    border-radius: 25px;
    padding: 5px 10px;
}

.search input[type="text"] {
    border: none;
    outline: none;
    padding: 6px;
    border-radius: 20px;
}

.search input[type="image"] {
    cursor: pointer;
}

.list2 a {
    text-decoration: none;
    color: white;
    font-weight: 500;
    transition: 0.3s;
}

.list2 a:hover {
    color: #ffd166;
}

.list2 li:last-child a {
    background: #ff4d6d;
    padding: 6px 15px;
    border-radius: 20px;
}

.list2 li:last-child a:hover {
    background: #ff1e4d;
    color: white;
}

/* ================= FEEDBACK SECTION ================= */
.feedback {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 70px;
}

.feedback form {
    background: white;
    width: 400px;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

.feedback h1 {
    text-align: center;
    color: #0d3b66;
    margin-bottom: 25px;
}

.form-group {
    margin-bottom: 20px;
}

label {
    font-size: 14px;
    font-weight: 500;
    color: #333;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-family: 'Poppins', sans-serif;
    transition: 0.3s;
}

input:focus, textarea:focus {
    border-color: #1d5fa7;
    box-shadow: 0 0 5px rgba(29,95,167,0.4);
    outline: none;
}

textarea {
    resize: none;
}

/* Submit Button */
.wrapper {
    text-align: center;
}

button {
    background: linear-gradient(90deg, #0d3b66, #1d5fa7);
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="main">
    <ul>
        <div class="list">
            <li class="logo">
                <a href="mainPage.html">
                    <img src="earth-globe.png" alt="Logo" style="width:40px;height:40px">
                </a>
            </li>

            <div class="search">
                <form method="POST" action="info.php">
                    <input type="text" name="search_p" placeholder="Search places...">
                    <input type="image" name="submit_p" src="search_icon.png" style="width:20px;height:20px;">
                </form>
            </div>
        </div>

        <div class="list2">
            <li><a href="mainPage.html">Home</a></li>
            <li><a href="destination.html">Destination</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="feedback.html">Feedback</a></li>
            <li><a href="index.html">Logout</a></li>
        </div>
    </ul>
</div>

<div class="feedback">
    <form name="feedbackForm" method="POST" action="feedback.php">
        <h1>Feedback Form</h1>

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Your Email</label>
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Your Feedback</label>
            <textarea name="feedbk" rows="4" placeholder="Write your feedback here..." required></textarea>
        </div>

        <div class="wrapper">
            <button type="submit" name="submit">Submit Feedback</button>
        </div>
    </form>
</div>

</body>
</html>
